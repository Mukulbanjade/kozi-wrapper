<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideQuest</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; background-color: #ffffff; font-family: 'Montserrat', sans-serif;">

    <div id="offline-ui" style="display: none; flex-direction: column; justify-content: center; align-items: center; height: 100vh;">
        
        <div style="text-align: center; margin-bottom: 50px;">
            <h1 style="font-size: 90px; font-weight: 900; color: #000000; margin: 0; letter-spacing: -4px; line-height: 1;">SQ</h1>
            <h2 style="font-size: 16px; font-weight: 700; color: #000000; margin: 0; letter-spacing: 3px; text-transform: uppercase;">Side Quest</h2>
        </div>

        <h3 style="font-size: 22px; font-weight: 700; color: #000000; margin-bottom: 12px; text-align: center;">Connection Lost.</h3>
        <p style="font-size: 14px; font-weight: 400; color: #666666; max-width: 280px; text-align: center; margin-bottom: 40px; line-height: 1.6;">
            The campus Wi-Fi let you down. Get back online to resume your missions.
        </p>

        <button onclick="window.location.reload()" style="background-color: #000000; color: #ffffff; border: none; padding: 16px 36px; font-size: 13px; font-weight: 700; border-radius: 50px; cursor: pointer; text-transform: uppercase; letter-spacing: 1.5px;">
            RETRY CONNECTION
        </button>
    </div>
    <script>
        const TARGET = "https://www.side-quest.site/";

        function showOffline() {
            document.getElementById('offline-ui').style.display = 'flex';
        }

        // navigator.onLine is unreliable in WebViews — it only checks network
        // connectivity, not actual internet access. Use a real fetch probe instead.
        // AbortSignal.timeout() is not available on iOS 15.0–15.3, so use a
        // manual AbortController + setTimeout for broader compatibility.
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 5000);

        fetch("https://www.side-quest.site/", { method: 'HEAD', cache: 'no-store', signal: controller.signal })
            .then(() => {
                clearTimeout(timer);
                window.location.replace(TARGET);
            })
            .catch(() => {
                clearTimeout(timer);
                showOffline();
            });
    </script>

</body>
</html>
